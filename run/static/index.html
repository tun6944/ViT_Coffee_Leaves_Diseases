<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Leaf Disease Detection</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Coffee Leaf Disease</h1>
            <p>YOLO + ViT Detection Engine</p>
        </header>

        <div class="upload-container" id="drop-zone">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-content">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & Drop your leaf image here</p>
                <span>or click to browse</span>
            </div>
            <img id="preview" class="hidden" alt="Preview">
        </div>
        
        <div class="canvas-wrapper hidden" id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <button id="predict-btn" class="glow-on-hover" disabled>Detect Disease</button>

        <div id="results-container" class="hidden">
            <h3>Detection Results</h3>
            <div id="result"></div>
        </div>
        
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>
    </div>
    <script src="static/app.js"></script>
</body>
</html>
